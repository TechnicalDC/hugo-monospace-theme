{{ $title := .Get "title" }}
{{ $subtitle := .Get "subtitle" }}
{{ $date := .Get "date" }}
<li class="timeline-item">
	<div class="nextprev">
	{{ if $title }}
	<b>{{ $title }}</b>
	{{ end }}
	{{ if $date }}
	<b>[{{ $date }}]</b>
	{{ end }}
	</div>
	<hr class="wrapper-line"/>
	{{ if $subtitle }}
	<i>{{ $subtitle }}</i>
	{{ end }}
	{{- .Inner | markdownify -}}
</li>
<br/>
