{{ $title := .Get "title" }}
{{ $subtitle := .Get "subtitle" }}
{{ $date := .Get "date" }}
<tr>
	<td>{{ $date }}</td>
	<td>
		{{ if $title }}
		<b>{{ $title }}</b>
		{{ end }}
		<hr class="wrapper-line"/>
		{{ if $subtitle }}
		<i>{{ $subtitle }}</i>
		{{ end }}
		{{- .Inner | markdownify -}}
	</td>
</tr>
<tr>
	<td>&nbsp;</td>
	<td>&nbsp;</td>
</tr>
