{{ define "title" -}}
{{ .Title | title }}
<hr class="wrapper-line"/>
{{- end }}
{{ define "main" -}}
{{ .Content }}
<table class="time-list">
	<tbody>
		{{ range sort .Pages "Date" "desc" }}
		<tr>
			<td>{{- partial "date" .Date -}}</td>
			<td><a href="{{ .RelPermalink }}">{{ .Title }}</a></td>
		</tr>
		{{ end }}
	</tbody>
</table>
{{- partial "footer.html" . -}}
{{- end }}
