{{ define "title" -}}
{{ .Title | title }}
<hr class="wrapper-line"/>
{{- end }}
{{ define "main" -}}
{{ .Content }}
<table class="time-list">
	<tbody>
		{{ range .Data.Terms.ByCount }}
		<tr>
			<td>{{ .Count }}</td>
			<td><a href="{{ .Page.RelPermalink }}">{{ .Page.LinkTitle }}</a></td>
		</tr>
		{{ end }}
	</tbody>
</table>
{{- partial "footer.html" . -}}
{{- end }}
